name: publish-pypi

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing tag to validate and rebuild without publishing
        required: true
        type: string

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"
  PYTHONPATH: src
  NO_COLOR: "1"
  CLICOLOR: "0"
  TERM: dumb

jobs:
  validate-build:
    name: Validate and build distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.release_tag }}

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build and test dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build twine

      - name: Validate release version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name || inputs.release_tag }}
        run: python .github/scripts/validate_release_version.py --tag "${RELEASE_TAG}" --check-pypi

      - name: Run complete test suite
        run: python -m pytest -q

      - name: Build source and wheel distributions
        run: python -m build --sdist --wheel --outdir dist

      - name: Validate distribution metadata
        run: python -m twine check dist/*

      - name: Verify distribution set
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          sdists=(dist/*.tar.gz)
          if (( ${#wheels[@]} != 1 || ${#sdists[@]} != 1 )); then
            echo "Expected exactly one wheel and one source distribution." >&2
            printf 'Found: %s\n' dist/* >&2
            exit 1
          fi

      - name: Upload verified distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: mana-agent-pypi-distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 14

  publish-pypi:
    name: Publish verified distributions to PyPI
    needs: validate-build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/mana-agent/
    concurrency:
      group: publish-pypi-production
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download verified distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: mana-agent-pypi-distributions
          path: dist

      - name: Publish distributions with Trusted Publishing
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
